server:
  port: 80

spring:
  application:
    name: arguing-tutorial-server
  datasource:
    url: jdbc:mysql://${MYSQL_ADDRESS:localhost:3306}/arguing_tutorial?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      initialization-fail-timeout: 60000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

ai:
  api-url: ${AI_API_URL:https://open.bigmodel.cn/api/paas/v4/chat/completions}
  api-key: ${AI_API_KEY:sk-placeholder}
  model: ${AI_MODEL:glm-4-flash}

logging:
  level:
    com.arguing: DEBUG
    org.hibernate.SQL: DEBUG

ali:
  access-key-id: ${ALI_ACCESS_KEY_ID:your-access-key-id}
  access-key-secret: ${ALI_ACCESS_KEY_SECRET:your-access-key-secret}
  app-key: ${ALI_APP_KEY:your-app-key}

# 微信云托管内置存储（腾讯云 COS）
# 临时密钥由 WxCloudCosCredentialsProvider 自动获取，无需配置 secret-id/secret-key
storage:
  cos:
    region: ${COS_REGION:ap-shanghai}
    bucket: ${COS_BUCKET:7072-prod-3g0nnk2k58e9785d-1421024449}

